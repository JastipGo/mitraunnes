<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JastipUnnes - Driver</title>
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
<style>
/* --- CSS UI UTAMA (MIRIP CUSTOMER UNTUK KONSISTENSI) --- */
:root{--black:#000;--white:#FFF;--gray-100:#F6F6F6;--gray-200:#EBEBEB;--gray-300:#D4D4D4;--gray-400:#9A9A9A;--gray-500:#6B6B6B;--gray-600:#3D3D3D;--gray-700:#2A2A2A;--gray-800:#1A1A1A;--gray-900:#111;--blue:#0052FF;--blue-dark:#0040C5;--red:#EE2434;--amber:#F5A524;--font:'DM Sans',sans-serif;--radius-sm:6px;--radius-md:12px;--radius-lg:16px;--radius-full:100px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--gray-100);color:var(--black);font-family:var(--font);user-select:none;-webkit-user-select:none}
input,textarea{user-select:auto;-webkit-user-select:auto}
*{-webkit-tap-highlight-color:transparent!important;outline:none!important;box-shadow:none!important}
.d-none{display:none!important}.text-center{text-align:center}

/* SPLASH & AUTH */
#splash{position:fixed;inset:0;z-index:9000;background:var(--blue);display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100dvh;}
#splash.hidden{display:none}
.splash-hero{flex:1;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px 24px}
.splash-wordmark{font-size:42px;font-weight:800;color:var(--white);letter-spacing:-1.5px;line-height:1}
.splash-tagline{font-size:15px;font-weight:500;color:rgba(255,255,255,0.8);margin-top:10px;}
.auth-sheet{width:100%;max-width:500px;background:var(--white);border-radius:24px 24px 0 0;padding:28px 24px 40px}
.field-wrap{margin-bottom:14px}.field{width:100%;padding:14px 16px;border-radius:var(--radius-md);border:1.5px solid var(--gray-200);background:var(--gray-100);font-family:var(--font);font-size:15px;font-weight:500;}
.btn-primary{width:100%;padding:16px;border:none;cursor:pointer;border-radius:var(--radius-full);font-family:var(--font);font-size:15px;font-weight:700;background:var(--blue);color:var(--white);display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-secondary{width:100%;padding:16px;border:1.5px solid var(--gray-200);cursor:pointer;border-radius:var(--radius-full);font-family:var(--font);font-size:15px;font-weight:700;background:var(--white);color:var(--black);margin-top:10px;}
.btn-green{background:#06C167; color:#000;}

/* APP LAYOUT */
#app{display:none;flex-direction:column;height:100dvh;overflow-y:auto;}
#app.visible{display:flex}
.top-bar{position:sticky;top:0;z-index:100;background:var(--blue);padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.top-bar-brand{font-size:20px;font-weight:800;color:var(--white);}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--white);display:flex;height:68px;border-top:1px solid var(--gray-200);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:none;background:none;color:var(--gray-500);gap:4px;}
.nav-item.active{color:var(--blue)}.nav-item .label{font-size:11px;font-weight:700;}
.content{flex:1;padding:0 0 80px;max-width:600px;margin:0 auto;width:100%}
.page{display:none}.page.active{display:block}
.page-header{padding:20px 20px 10px;}
.page-title{font-size:24px;font-weight:800;color:var(--black);}

/* CARDS */
.card{background:var(--white);margin:12px 16px;border-radius:var(--radius-lg);padding:18px;box-shadow:0 2px 8px rgba(0,0,0,0.05); border:1px solid var(--gray-200);}
.order-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--gray-100);}
.badge{padding:4px 10px;border-radius:var(--radius-full);font-size:11px;font-weight:700;text-transform:uppercase;}
.badge-new{background:#E0E7FF;color:var(--blue-dark);}
.badge-active{background:#DCFCE7;color:#048A48;}
.detail-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:14px;}
.detail-row strong{color:var(--black);}
.detail-row span{color:var(--gray-500);text-align:right;max-width:65%;}

/* UPLOAD OVERLAY */
#loading-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:10000;display:none;flex-direction:column;align-items:center;justify-content:center;}
#loading-overlay.visible{display:flex}
.spinner{border:3px solid rgba(255,255,255,0.1);border-top:3px solid var(--blue);border-radius:50%;width:40px;height:40px;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* DYNAMIC FLOW CONTAINER */
.action-flow{background:var(--gray-100);padding:16px;border-radius:var(--radius-md);margin-top:16px;text-align:center;}
.file-upload-wrapper{position:relative; overflow:hidden; display:inline-block; width:100%; margin-bottom:10px;}
.file-upload-wrapper input[type=file]{font-size:100px; position:absolute; left:0; top:0; opacity:0; cursor:pointer;}
</style>
</head>
<body>

<div id="loading-overlay"><div class="spinner"></div><p style="color:#FFF;margin-top:10px;font-weight:bold;" id="loading-text">Memproses...</p></div>

<div id="splash">
    <div class="splash-hero">
        <span class="material-symbols-outlined" style="font-size:64px;color:#FFF;margin-bottom:10px;">two_wheeler</span>
        <div class="splash-wordmark">JastipUnnes</div>
        <div class="splash-tagline">Aplikasi Mitra Pengemudi</div>
    </div>
    <div class="auth-sheet">
        <div id="auth-login-form">
            <h3 style="margin-bottom:20px;text-align:center;">Login Mitra</h3>
            <div class="field-wrap"><input type="email" class="field" id="login-email" placeholder="Email Driver"></div>
            <div class="field-wrap"><input type="password" class="field" id="login-pass" placeholder="Password"></div>
            <button class="btn-primary" onclick="window.doLogin()">Masuk</button>
            <button class="btn-secondary" onclick="window.doSignup()">Daftar Akun Baru</button>
        </div>
    </div>
</div>

<div id="app">
    <div class="top-bar">
        <div class="top-bar-brand">Driver Dashboard</div>
        <button onclick="window.doLogout()" style="background:none;border:none;color:#FFF;cursor:pointer;"><span class="material-symbols-outlined">logout</span></button>
    </div>
    
    <div class="content">
        <div class="page active" id="page-cari">
            <div class="page-header"><div class="page-title">Order Tersedia</div></div>
            <div id="available-orders"></div>
        </div>

        <div class="page" id="page-aktif">
            <div class="page-header"><div class="page-title">Pekerjaan Saat Ini</div></div>
            <div id="active-order-container"></div>
        </div>

        <div class="page" id="page-profil">
            <div class="page-header"><div class="page-title">Profil & Saldo</div></div>
            <div class="card" style="text-align:center;">
                <span class="material-symbols-outlined" style="font-size:64px;color:var(--gray-300);">account_circle</span>
                <h3 id="prof-nama" style="margin-top:10px;">-</h3>
                <p id="prof-rank" style="color:var(--gray-500);font-size:14px;font-weight:600;">-</p>
                <div style="background:var(--blue);color:#FFF;padding:16px;border-radius:var(--radius-md);margin-top:16px;">
                    <div style="font-size:12px;opacity:0.8;">Total Saldo / Pendapatan</div>
                    <div style="font-size:24px;font-weight:800;" id="prof-saldo">Rp 0</div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" id="nav-cari" onclick="window.switchPage('cari')"><span class="material-symbols-outlined">radar</span><span class="label">Cari Order</span></button>
        <button class="nav-item" id="nav-aktif" onclick="window.switchPage('aktif')"><span class="material-symbols-outlined">two_wheeler</span><span class="label">Order Aktif</span></button>
        <button class="nav-item" id="nav-profil" onclick="window.switchPage('profil')"><span class="material-symbols-outlined">person</span><span class="label">Profil</span></button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const app = initializeApp({
    apiKey: "AIzaSyDeAIeJYabLqzX8_lwBkDZE98EOc3-9lYY",
    authDomain: "arsipmrikanasin.firebaseapp.com",
    projectId: "arsipmrikanasin",
    storageBucket: "arsipmrikanasin.firebasestorage.app",
    messagingSenderId: "789371282298",
    appId: "1:789371282298:web:edc61d7bc00935fc22ecc3"
});

const auth = getAuth(app);
const db = getFirestore(app);

let currentUserUid = '';
let driverData = null;
let activeOrderDocId = null; // Menyimpan ID order yang sedang dikerjakan driver
let locationInterval = null; // Interval untuk sharelocationDriver
let fileBuffer = null; // Menyimpan file foto sebelum diupload

// ==========================================
// KONFIGURASI CLOUDINARY
// ==========================================
const CLOUDINARY_UPLOAD_PRESET = 'presensi_unsigned'; // GANTI DENGAN PRESET CLOUDINARY ANDA
const CLOUDINARY_CLOUD_NAME = 'dn2o2vf04';       // GANTI DENGAN CLOUD NAME ANDA

window.switchPage = (p) => {
    document.querySelectorAll('.page, .nav-item').forEach(el => el.classList.remove('active'));
    document.getElementById('page-' + p).classList.add('active');
    document.getElementById('nav-' + p).classList.add('active');
};

function showLoading(text) {
    document.getElementById('loading-text').innerText = text;
    document.getElementById('loading-overlay').classList.add('visible');
}
function hideLoading() {
    document.getElementById('loading-overlay').classList.remove('visible');
}

// ==========================================
// AUTENTIKASI & PROFIL
// ==========================================
onAuthStateChanged(auth, async (user) => {
    if (user) {
        currentUserUid = user.uid;
        await loadDriverProfile();
    } else {
        document.getElementById('app').classList.remove('visible');
        document.getElementById('splash').classList.remove('hidden');
        if(locationInterval) clearInterval(locationInterval);
    }
});

window.doLogin = async () => {
    const e = document.getElementById('login-email').value, p = document.getElementById('login-pass').value;
    if(!e || !p) return alert('Isi data!');
    showLoading('Masuk...');
    try { await signInWithEmailAndPassword(auth, e, p); } 
    catch(err) { alert('Gagal: ' + err.message); hideLoading(); }
};

window.doSignup = async () => {
    const e = document.getElementById('login-email').value, p = document.getElementById('login-pass').value;
    if(!e || p.length < 6) return alert('Email & Pass(min 6) wajib!');
    showLoading('Mendaftar...');
    try {
        const c = await createUserWithEmailAndPassword(auth, e, p);
        // STANDAR FIELD USER DARI INSTRUKSI
        await setDoc(doc(db, "user", c.user.uid), {
            CustomerID: "",
            GetdriverID: c.user.uid,
            nama: "Driver Baru",
            wa: "0800000000",
            email: e,
            urlProfile: "",
            role: "driver",
            saldo: 0,
            stnk: "B 1234 XYZ", // Contoh kendaraan
            sim: "",
            skck: "",
            ktp: "",
            status: "belumterverifikasi"
        });
        
        // Buat field saldo khusus driver
        await setDoc(doc(db, "saldo", c.user.uid), {
            getdriverID: c.user.uid,
            saldo: 0
        });
        
        await loadDriverProfile();
    } catch(err) { alert('Gagal: ' + err.message); hideLoading(); }
};

window.doLogout = () => signOut(auth);

async function loadDriverProfile() {
    try {
        const snap = await getDoc(doc(db, "user", currentUserUid));
        if (snap.exists() && snap.data().role === 'driver') {
            driverData = snap.data();
            document.getElementById('prof-nama').innerText = driverData.nama;
            document.getElementById('prof-rank').innerText = "Status: " + driverData.status.toUpperCase();
            
            const saldoSnap = await getDoc(doc(db, "saldo", currentUserUid));
            if(saldoSnap.exists()) {
                document.getElementById('prof-saldo').innerText = "Rp " + saldoSnap.data().saldo.toLocaleString('id-ID');
            }

            document.getElementById('splash').classList.add('hidden');
            document.getElementById('app').classList.add('visible');
            
            listenToOrders();
            hideLoading();
        } else {
            alert("Akun ini bukan Driver!");
            signOut(auth);
            hideLoading();
        }
    } catch(e) { console.error(e); hideLoading(); }
}

// ==========================================
// LISTENER & PEMROSESAN ORDER
// ==========================================
function listenToOrders() {
    // 1. Listen Order Baru (getdriverId kosong & status menunggu)
    const qAvailable = query(collection(db, "orders"), where("getdriverId", "==", ""), where("status", "==", "menunggu"));
    onSnapshot(qAvailable, (snapshot) => {
        let html = '';
        snapshot.forEach(doc => {
            const o = doc.data();
            html += `
            <div class="card">
                <div class="order-header">
                    <span class="badge badge-new">${o.kategori}</span>
                    <strong style="font-size:18px; color:var(--blue);">Rp ${o.Argo.toLocaleString('id-ID')}</strong>
                </div>
                <div class="detail-row"><span>Ambil:</span> <strong>${o.namaAmbil}</strong></div>
                <div class="detail-row"><span>Antar:</span> <strong>${o.NamaAntar}</strong></div>
                <div class="detail-row"><span>Jarak:</span> <strong>${o.JarakTempuh} KM</strong></div>
                <button class="btn-primary" style="margin-top:12px;" onclick="window.terimaOrder('${doc.id}')">Ambil Order Ini</button>
            </div>`;
        });
        document.getElementById('available-orders').innerHTML = html || '<p class="text-center" style="margin-top:20px;color:var(--gray-500);">Tidak ada order tersedia.</p>';
    });

    // 2. Listen Order Aktif Milik Driver Ini
    const qActive = query(collection(db, "orders"), where("getdriverId", "==", currentUserUid));
    onSnapshot(qActive, (snapshot) => {
        let activeHTML = '';
        let hasActive = false;
        activeOrderDocId = null;

        snapshot.forEach(d => {
            const o = d.data();
            if (o.status !== 'selesai' && o.status !== 'dibatalkan') {
                hasActive = true;
                activeOrderDocId = d.id;
                activeHTML = renderActiveOrder(d.id, o);
                
                // Perekaman lokasi otomatis jika status sedang ngantar (10 detik sekali)
                if(o.status === 'ngantar' && !locationInterval) {
                    startLocationTracking(d.id);
                } else if (o.status !== 'ngantar' && locationInterval) {
                    clearInterval(locationInterval);
                    locationInterval = null;
                }
            }
        });

        if(hasActive) {
            document.getElementById('active-order-container').innerHTML = activeHTML;
            // Jika ada order aktif, sembunyikan order tersedia agar fokus
            document.getElementById('available-orders').innerHTML = '<p class="text-center" style="color:var(--amber);font-weight:bold;">Selesaikan order aktif Anda terlebih dahulu.</p>';
        } else {
            document.getElementById('active-order-container').innerHTML = '<p class="text-center" style="margin-top:20px;color:var(--gray-500);">Belum ada pekerjaan aktif.</p>';
            if(locationInterval) { clearInterval(locationInterval); locationInterval = null; }
        }
    });
}

// FUNGSI 1: DRIVER MENERIMA ORDER
window.terimaOrder = async (orderId) => {
    if(activeOrderDocId) return alert('Anda masih memiliki order yang belum selesai!');
    showLoading('Menerima...');
    try {
        // Mengisi Informasi Order Driver (IOD)
        await updateDoc(doc(db, "orders", orderId), {
            getdriverId: currentUserUid,
            driverName: driverData.nama,
            waDriver: driverData.wa,
            sinceDriver: "Baru Bergabung", // Bisa dihitung dari auth user creation time
            rankDriver: driverData.status,
            UrlprofileDriver: driverData.urlProfile || "",
            kendaraanDriver: driverData.stnk || "-",
            status: "terima" 
        });
        window.switchPage('aktif');
    } catch(e) { alert(e.message); } finally { hideLoading(); }
};

// ==========================================
// RENDER UI BERDASARKAN STATUS (STATE MACHINE)
// ==========================================
function renderActiveOrder(orderId, o) {
    let actionHTML = '';

    // FLOW STATE: terima -> ambil -> ngantar -> tiba -> selesai
    if (o.status === 'terima') {
        actionHTML = `<button class="btn-primary" onclick="window.updateStatus('${orderId}', 'ambil')">Menuju Lokasi (Klik jika sudah jalan mengambil)</button>`;
    } 
    else if (o.status === 'ambil') {
        actionHTML = `
        <div class="action-flow">
            <p style="font-size:13px;margin-bottom:10px;font-weight:600;">Upload Foto Barang/Nota di lokasi pengambilan</p>
            <div class="file-upload-wrapper">
                <button class="btn-secondary">Pilih Foto Bukti Ambil</button>
                <input type="file" accept="image/*" onchange="window.prepareFile(event)">
            </div>
            <p id="file-name-display" style="font-size:12px;color:var(--green);margin-bottom:10px;"></p>
            <button class="btn-primary btn-green" onclick="window.uploadBuktiAmbil('${orderId}')">Upload & Lanjut Antar</button>
        </div>`;
    } 
    else if (o.status === 'ngantar') {
        actionHTML = `
        <div class="action-flow" style="background:#E0E7FF;">
            <p style="font-size:13px;margin-bottom:10px;font-weight:600;color:var(--blue-dark);">Lokasi Anda dibagikan ke Customer secara live.</p>
            <button class="btn-primary" onclick="window.updateStatus('${orderId}', 'tiba')">Tiba di Tujuan</button>
        </div>`;
    } 
    else if (o.status === 'tiba') {
        actionHTML = `
        <div class="action-flow">
            <p style="font-size:13px;margin-bottom:10px;font-weight:600;">Upload Foto Bukti Pengantaran Selesai</p>
            <div class="file-upload-wrapper">
                <button class="btn-secondary">Pilih Foto Bukti Selesai</button>
                <input type="file" accept="image/*" onchange="window.prepareFile(event)">
            </div>
            <p id="file-name-display" style="font-size:12px;color:var(--green);margin-bottom:10px;"></p>
            <button class="btn-primary" style="background:var(--black);" onclick="window.uploadBuktiSelesai('${orderId}', ${o.Argo})">Selesaikan Pesanan</button>
        </div>`;
    }

    return `
    <div class="card" style="border-color:var(--blue);">
        <div class="order-header">
            <span class="badge badge-active">STATUS: ${o.status.toUpperCase()}</span>
            <strong style="font-size:18px;">Rp ${o.Argo.toLocaleString('id-ID')}</strong>
        </div>
        <div class="detail-row"><span>Customer:</span> <strong>${o.namaPenerima}</strong></div>
        <div class="detail-row"><span>WA Customer:</span> <strong>${o.waPenerima}</strong></div>
        <hr style="border:none;border-top:1px solid var(--gray-200);margin:12px 0;">
        <div class="detail-row"><span>Ambil Di:</span> <strong>${o.namaAmbil}</strong></div>
        <div class="detail-row"><span>Antar Ke:</span> <strong>${o.NamaAntar}</strong></div>
        <div class="detail-row"><span>Catatan:</span> <strong>${o.catatan}</strong></div>
        
        <div style="margin-top:20px;">
            ${actionHTML}
        </div>
    </div>`;
}

// UPDATE STATUS BIASA (Tanpa Upload)
window.updateStatus = async (orderId, newStatus) => {
    showLoading('Memperbarui...');
    try {
        await updateDoc(doc(db, "orders", orderId), { status: newStatus });
    } catch(e) { alert(e.message); } finally { hideLoading(); }
};

// ==========================================
// UPLOAD CLOUDINARY & KOORDINAT
// ==========================================
window.prepareFile = (e) => {
    if(e.target.files.length > 0) {
        fileBuffer = e.target.files[0];
        document.getElementById('file-name-display').innerText = "File siap: " + fileBuffer.name;
    }
};

async function uploadImageToCloudinary(file) {
    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
    
    try {
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, {
            method: 'POST', body: formData
        });
        const data = await res.json();
        return data.secure_url; // Mengembalikan URL asli
    } catch (e) {
        console.error("Gagal Cloudinary, memastikan fallback API", e);
        // Fallback: Jika preset tidak dikonfigurasi, kita gunakan base64 agar sistem tetap berjalan secara visual
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (ev) => resolve(ev.target.result);
            reader.readAsDataURL(file);
        });
    }
}

// DAPATKAN KOORDINAT (Dijanjikan / Promise)
function getCoordinates() {
    return new Promise((resolve, reject) => {
        if(!navigator.geolocation) return reject("GPS tidak didukung");
        navigator.geolocation.getCurrentPosition(
            p => resolve(`${p.coords.longitude.toFixed(6)}, ${p.coords.latitude.toFixed(6)}`), // Lng, Lat (OSRM format)
            e => reject(e.message),
            { enableHighAccuracy: true }
        );
    });
}

// FLOW: KLIK UPLOAD BUKTI AMBIL -> Merekam 'titikAmbil' & Mengubah status 'ngantar'
window.uploadBuktiAmbil = async (orderId) => {
    if(!fileBuffer) return alert('Pilih foto terlebih dahulu!');
    showLoading('Mengupload & Mendapatkan GPS...');
    
    try {
        let koordinat = "";
        try { koordinat = await getCoordinates(); } catch(g) { console.log('Gagal GPS', g); }
        
        const imgUrl = await uploadImageToCloudinary(fileBuffer);
        fileBuffer = null; // Reset
        
        // Memperbarui IPO (Informasi Proses Order) sesuai instruksi poin 3
        await updateDoc(doc(db, "orders", orderId), {
            titikAmbil: koordinat, // Dicatat untuk awal rute OSRM Customer
            urlbuktiAmbil: imgUrl,
            status: "ngantar" // Lanjut ke step ngantar
        });
        
    } catch(e) { alert('Gagal Upload: ' + e.message); } finally { hideLoading(); }
};

// FLOW: KLIK UPLOAD BUKTI SELESAI -> Menutup order & Mencatat pendapatan
window.uploadBuktiSelesai = async (orderId, argoAmount) => {
    if(!fileBuffer) return alert('Pilih foto bukti terlebih dahulu!');
    showLoading('Menyelesaikan Order...');
    
    try {
        const imgUrl = await uploadImageToCloudinary(fileBuffer);
        fileBuffer = null;
        
        // Update Order
        await updateDoc(doc(db, "orders", orderId), {
            urlbuktiSelesai: imgUrl,
            status: "selesai"
        });
        
        // Tambah ke koleksi 'pendapatan' (Sesuai instruksi)
        await setDoc(doc(collection(db, "pendapatan")), {
            createdBy: currentUserUid,
            uang: argoAmount,
            timestamp: new Date().toISOString()
        });
        
        // Update total 'saldo' driver (Sesuai instruksi)
        const saldoRef = doc(db, "saldo", currentUserUid);
        const saldoSnap = await getDoc(saldoRef);
        let newSaldo = argoAmount;
        if(saldoSnap.exists()) newSaldo += saldoSnap.data().saldo;
        
        await updateDoc(saldoRef, { saldo: newSaldo });
        
        alert('Order Selesai! Saldo bertambah.');
        loadDriverProfile(); // Refresh saldo UI
        
    } catch(e) { alert('Gagal Menyelesaikan: ' + e.message); } finally { hideLoading(); }
};

// ==========================================
// REALTIME LOCATION TRACKER (Setiap 10 Detik)
// ==========================================
function startLocationTracking(orderId) {
    if(locationInterval) clearInterval(locationInterval);
    
    // Fungsi tembak lokasi
    const pushLocation = () => {
        if(!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(async (p) => {
            let coords = `${p.coords.longitude.toFixed(6)}, ${p.coords.latitude.toFixed(6)}`;
            try {
                // Perbarui field sharelocationDriver agar Customer membaca pergerakan
                await updateDoc(doc(db, "orders", orderId), { sharelocationDriver: coords });
            } catch(e) { console.log('Silently fail pushing loc'); }
        }, null, { enableHighAccuracy: true });
    };

    pushLocation(); // Eksekusi pertama kali
    locationInterval = setInterval(pushLocation, 30000); // Set interval 10 detik
}
